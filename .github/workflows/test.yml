name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # Four node-test packages run in parallel. bin/roadtest.js uses tsx to load
  # runner source directly, but that source does `import from "roadtest"`, which
  # Node's resolver maps to `roadtest/dist/*` via the exports field — so we need
  # `roadtest` built before the CLI can run.
  node-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - filter: example
            script: test:node
          - filter: "roadtest"
            script: test:node
          - filter: "@roadtest/runner"
            script: test:node
          - filter: scale
            script: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --workspace-concurrency=1 --filter='!@roadtest/website' build

      - name: Test — ${{ matrix.filter }}
        run: pnpm --filter "${{ matrix.filter }}" ${{ matrix.script }}

  # Build verification runs in parallel with node-tests and e2e.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter roadtest build

      - name: Build runner
        run: pnpm --filter @roadtest/runner build

  # E2E runs in parallel with node-tests and build.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --workspace-concurrency=1 --filter='!@roadtest/website' build

      - name: Install Playwright browsers
        run: pnpm --filter e2e exec playwright install --with-deps chromium

      - name: Test — e2e (dev + build)
        run: pnpm test:e2e
        env:
          CI: true

      - name: Upload Playwright test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: apps/e2e/test-results/
          retention-days: 7
