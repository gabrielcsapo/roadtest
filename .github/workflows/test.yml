name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @fieldtest/core build

      - name: Build runner
        run: pnpm --filter @fieldtest/runner build

      - name: Test — example app
        run: pnpm --filter example test:node

      - name: Test — core package
        run: pnpm --filter @fieldtest/core test:node

      - name: Test — runner package
        run: pnpm --filter @fieldtest/runner test:node

      - name: Test — scale app
        run: pnpm --filter scale test
